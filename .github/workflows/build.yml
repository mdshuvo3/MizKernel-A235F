name: MizKernel-A23-KSU-Next
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Environment Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf libelf-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils rsync squashfs-tools xsltproc zip zlib1g-dev python3 binutils-aarch64-linux-gnu device-tree-compiler
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: 2. Maximize Build Space & RAM
        run: |
          sudo swapoff -a || true
          sudo rm -f /swap_mizkernel
          sudo dd if=/dev/zero of=/swap_mizkernel bs=1M count=10240
          sudo chmod 600 /swap_mizkernel
          sudo mkswap /swap_mizkernel
          sudo swapon /swap_mizkernel
          free -h

      - name: 3. Pull Source & Toolchain
        run: |
          git clone --depth=1 https://github.com/${{ github.repository }} kernel
          mkdir -p toolchain
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git toolchain/clang

      - name: 4. Inject KernelSU-Next
        run: |
          git clone --depth=1 https://github.com/rifsxd/KernelSU-Next ksu_src
          rm -rf kernel/drivers/kernelsu
          mkdir -p kernel/drivers/kernelsu
          rsync -av ksu_src/kernel/ kernel/drivers/kernelsu/

      - name: 5. Surgical Code Fixes
        run: |
          cd kernel
          # Fix 1: Header Prototypes
          sed -i 's/void ksu_persistent_allow_list()/void ksu_persistent_allow_list(void)/g' drivers/kernelsu/allowlist.h
          
          # Fix 2: VFS Hooks - Using the most robust redirection method
          # Prepend the header to the very top of the file
          echo '#include "../drivers/kernelsu/allowlist.h"' | cat - fs/read_write.c > fs/read_write.c.tmp && mv fs/read_write.c.tmp fs/read_write.c
          
          # Inject the hook before every 'return ret;' in fs/read_write.c
          # This covers both vfs_read and vfs_write regardless of their internal structure
          sed -i '/return ret;/i \	ksu_handle_allowlist(file, buf, count, \&ret);' fs/read_write.c

          # Fix 3: Samsung Techpack Path Robustness
          TAS_CODEC="techpack/audio/asoc/codecs/tas256x/os_layer/src/tas256x-codec.c"
          TAS_MAKEFILE="techpack/audio/asoc/codecs/tas256x/Makefile"
          
          if [ -f "$TAS_CODEC" ]; then
            sed -i 's|#include "../../../physical_layer/inc/tas256x.h"|#include "tas256x.h"|g' "$TAS_CODEC"
            echo "ccflags-y += -I\$(srctree)/techpack/audio/asoc/codecs/tas256x/physical_layer/inc" >> "$TAS_MAKEFILE"
          fi

      - name: 6. Verify Fixes & Start Compilation
        run: |
          cd kernel
          # Check if the hook was actually injected successfully
          grep -q "ksu_handle_allowlist" fs/read_write.c || (echo "VFS Hook Failed!" && exit 1)
          
          chmod +x scripts/config
          export PATH="$GITHUB_WORKSPACE/toolchain/clang/bin:$PATH"
          
          ARGS="ARCH=arm64 \
                CC=clang \
                LD=ld.lld \
                AR=llvm-ar
