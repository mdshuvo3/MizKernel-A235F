name: MizKernel-Kconfig-Test
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Setup Environment
        run: sudo apt-get install -y bc bison flex libssl-dev

      - name: 2. Checkout & Absolute Patching
        run: |
          git clone --depth=1 https://github.com/${{ github.repository }} kernel
          
          # 1. Force KernelSU into place
          rm -rf kernel/drivers/kernelsu
          git clone --depth=1 https://github.com/rifsxd/KernelSU-Next kernel/drivers/kernelsu
          
          # 2. THE FIX: Change the hardcoded Kconfig line to an ABSOLUTE path
          # We tell the kernel exactly where the file is on the SSD
          KSU_ABS_PATH="$GITHUB_WORKSPACE/kernel/drivers/kernelsu/Kconfig"
          sed -i "s|source \"drivers/kernelsu/Kconfig\"|source \"$KSU_ABS_PATH\"|g" kernel/drivers/Kconfig
          
          # 3. Create a fake toolchain so defconfig doesn't crash
          mkdir -p kernel/toolchain/clang-r416183b/bin
          touch kernel/toolchain/clang-r416183b/bin/clang
          chmod +x kernel/toolchain/clang-r416183b/bin/clang

      - name: 3. Verify Defconfig (The Test)
        run: |
          cd kernel
          mkdir -p out
          # We only run the config phase to see if it finally 'sees' KernelSU
          make O=out ARCH=arm64 vendor/a23_eur_open_mizkernel_defconfig
