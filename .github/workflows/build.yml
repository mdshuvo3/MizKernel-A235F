name: MizKernel A23 Sandboxed Build
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf libelf-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop rsync squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3 binutils-aarch64-linux-gnu device-tree-compiler zstd libzstd-dev

      - name: 2. Setup Sandboxed Workspace
        run: |
          mkdir -p ${{ github.workspace }}/kernel
          mkdir -p ${{ github.workspace }}/tc
          mkdir -p ${{ github.workspace }}/anykernel

      - name: 3. Download Toolchain & Checkout Kernel
        uses: actions/checkout@v4
        with:
          path: kernel
          fetch-depth: 1

      - name: 4. Download Proton-Clang
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git ${{ github.workspace }}/tc

      - name: 5. Inject KernelSU-Next
        run: |
          cd ${{ github.workspace }}/kernel/drivers
          rm -rf kernelsu
          git clone --depth=1 https://github.com/rifsxd/KernelSU-Next kernelsu
          
          # Append to Kconfig and Makefile safely
          if ! grep -q "kernelsu" Kconfig; then
            echo 'source "drivers/kernelsu/Kconfig"' >> Kconfig
          fi
          if ! grep -q "kernelsu" Makefile; then
            echo 'obj-y += kernelsu/' >> Makefile
          fi

      - name: 6. Compile Kernel
        run: |
          cd ${{ github.workspace }}/kernel
          
          # Force the compiler into the path
          export PATH="${{ github.workspace }}/tc/bin:$PATH"
          
          # Explicitly define all LLVM variables so the build never falls back to GCC
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export CC=clang
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export LLVM=1
          export LLVM_IAS=0
          
          # Fix for Samsung DTB generation
          mkdir -p out/include
          ln -sf ../../include/dt-bindings out/include/dt-bindings
          
          # Generate Config
          make O=out vendor/a23_eur_open_mizkernel_defconfig
          
          # Build
          make -j$(nproc) O=out \
            KCFLAGS="-Wno-implicit-function-declaration -Wno-strict-prototypes -Wno-int-conversion -Wno-return-type"

      - name: 7. Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ${{ github.workspace }}/anykernel
          cd ${{ github.workspace }}/anykernel
          
          # Samsung A23 specific overrides
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's!block=.*!block=auto;!g' anykernel.sh
          sed -i 's/is_slot_device=1/is_slot_device=0/g' anykernel.sh
          
          # Locate and copy the compiled image
          BOOT_DIR="${{ github.workspace }}/kernel/out/arch/arm64/boot"
          if [ -f "$BOOT_DIR/Image.gz-dtb" ]; then
            cp "$BOOT_DIR/Image.gz-dtb" Image
          elif [ -f "$BOOT_DIR/Image.gz" ]; then
            cp "$BOOT_DIR/Image.gz" Image
          elif [ -f "$BOOT_DIR/Image" ]; then
            cp "$BOOT_DIR/Image" Image
          else
            echo "Error: No kernel Image found!"
            exit 1
          fi
          
          zip -r9 ${{ github.workspace }}/MizKernel-A23-Sandboxed.zip * -x .git README.md *placeholder

      - name: 8. Upload Flashable Zip
        uses: actions/upload-artifact@v4
        with:
          name: MizKernel-A23
          path: ${{ github.workspace }}/MizKernel-A23-Sandboxed.zip
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          # Tell AK3 to auto-detect the boot partition
          sed -i 's!block=.*!block=auto;!g' anykernel.sh
          # Add A23 codenames just in case it falls back to checking
          sed -i 's/device.name1=.*/device.name1=a23/g' anykernel.sh
          sed -i 's/device.name2=.*/device.name2=a235f/g' anykernel.sh
          sed -i 's/device.name3=.*/device.name3=a23x/g' anykernel.sh
          
          # Bring in the freshly built kernel image
          cp ../kernel/out/arch/arm64/boot/Image .
          
          # Zip it all up
          zip -r9 ../MizKernel-A23-Flashable.zip * -x .git README.md *placeholder
          
      - name: 6. Upload Final Zip
        uses: actions/upload-artifact@v4
        with:
          name: MizKernel-A23-Flashable
          path: MizKernel-A23-Flashable.zip
