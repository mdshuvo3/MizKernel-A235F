name: Build MizKernel A235F

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf libelf-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils rsync squashfs-tools xsltproc zip zlib1g-dev python3 binutils-aarch64-linux-gnu device-tree-compiler
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Clone Toolchain and Source
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang clang
          git clone --depth=1 https://github.com/mdshuvo3/MizKernel-A235F source
          git clone --depth=1 https://github.com/rifsxd/KernelSU-Next ksu

      - name: Patch Kernel and Techpack
        run: |
          cd source
          
          # Fix: Remove existing file/placeholder to allow directory copy
          rm -rf drivers/kernelsu
          cp -r ../ksu/kernel drivers/kernelsu
          
          # Add KernelSU to the drivers Makefile if not present
          if ! grep -q "obj-y += kernelsu/" drivers/Makefile; then
            echo "obj-y += kernelsu/" >> drivers/Makefile
          fi

          # Fix the tas256x-codec header path error
          find techpack/audio/asoc/codecs/tas256x -name "tas256x-codec.c" -exec sed -i 's|#include "physical_layer/inc/tas256x.h"|#include "../../../physical_layer/inc/tas256x.h"|' {} +

          # Apply VFS Patches for KernelSU-Next
          if ! grep -q "ksu_handle_allowlist" fs/read_write.c; then
            sed -i '/vfs_read/i int ksu_handle_allowlist(int fd);' fs/read_write.c
            sed -i '/ssize_t vfs_read(struct file/a \\tksu_handle_allowlist(fd);' fs/read_write.c
          fi

      - name: Build Kernel
        run: |
          cd source
          export PATH=$(pwd)/../clang/bin:$PATH
          # Set up build environment
          make O=out ARCH=arm64 a23_defconfig
          # Execute build
          make -j$(nproc --all) O=out \
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM
