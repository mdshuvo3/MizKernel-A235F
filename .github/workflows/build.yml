name: MizKernel-A23-KSU-Next
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Environment Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf libelf-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils rsync squashfs-tools xsltproc zip zlib1g-dev python3 binutils-aarch64-linux-gnu device-tree-compiler
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: 2. Maximize Build Space & RAM
        run: |
          sudo swapoff -a || true
          sudo rm -f /swap_mizkernel
          sudo dd if=/dev/zero of=/swap_mizkernel bs=1M count=12288
          sudo chmod 600 /swap_mizkernel
          sudo mkswap /swap_mizkernel
          sudo swapon /swap_mizkernel
          free -h

      - name: 3. Pull Source & Toolchain
        run: |
          git clone --depth=1 https://github.com/${{ github.repository }} kernel
          mkdir -p toolchain
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git toolchain/clang

      - name: 4. Inject KernelSU-Next
        run: |
          git clone --depth=1 https://github.com/rifsxd/KernelSU-Next ksu_src
          rm -rf kernel/drivers/kernelsu
          mkdir -p kernel/drivers/kernelsu
          cp -r ksu_src/kernel/* kernel/drivers/kernelsu/
          # Initialize git in kernelsu dir to provide KSU_GIT_VERSION
          cd kernel/drivers/kernelsu
          git init && git add . && git commit -m "init ksu"
          cd ../../../
          rm -rf ksu_src

      - name: 5. Surgical Code Fixes
        run: |
          cd kernel
          # Fix 1: Header Prototypes
          sed -i 's/void ksu_persistent_allow_list()/void ksu_persistent_allow_list(void)/g' drivers/kernelsu/allowlist.h
          
          # Fix 2: Precise VFS Hook Injection
          if ! grep -q "kernelsu/allowlist.h" fs/read_write.c; then
            sed -i '1i #include "../drivers/kernelsu/allowlist.h"' fs/read_write.c
          fi
          
          sed -i '/ssize_t vfs_read/,/return ret;/ s/return ret;/ksu_handle_allowlist(file, buf, count, \&ret);\n\treturn ret;/' fs/read_write.c
          sed -i '/ssize_t vfs_write/,/return ret;/ s/return ret;/ksu_handle_allowlist(file, buf, count, \&ret);\n\treturn ret;/' fs/read_write.c

          # Fix 3: Samsung Techpack Path Robustness
          TAS_MAKEFILE="techpack/audio/asoc/codecs/tas256x/Makefile"
          if [ -f "$TAS_MAKEFILE" ]; then
            echo "ccflags-y += -I\$(srctree)/techpack/audio/asoc/codecs/tas256x/physical_layer/inc" >> "$TAS_MAKEFILE"
          fi

          # Fix 4: Link KernelSU into the driver tree
          if ! grep -q "kernelsu" drivers/Makefile; then
            echo "obj-y += kernelsu/" >> drivers/Makefile
          fi

      - name: 6. Verify Fixes & Start Compilation
        run: |
          cd kernel
          HOOK_COUNT=$(grep -c "ksu_handle_allowlist" fs/read_write.c)
          echo "Hook count verified: $HOOK_COUNT"
          
          if [ "$HOOK_COUNT" -lt 2 ]; then
            echo "Error: VFS Hooks not found in fs/read_write.c"
            exit 1
          fi
          
          chmod +x scripts/config
          export PATH="$GITHUB_WORKSPACE/toolchain/clang/bin:$PATH"
          
          # Fixed KCFLAGS quote and added CLANG_TRIPLE
          export ARGS="ARCH=arm64 \
                CC=clang \
                LD=ld.lld \
                AR=llvm-ar \
                NM=llvm-nm \
                OBJCOPY=llvm-objcopy \
                OBJDUMP=llvm-objdump \
                STRIP=llvm-strip \
                CROSS_COMPILE=aarch64-linux-gnu- \
                CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                CLANG_TRIPLE=aarch64-linux-gnu- \
                LLVM=1 \
                LLVM_IAS=1 \
                KCFLAGS=-I$(pwd)/drivers/kernelsu"

          make $ARGS vendor/a23_eur_open_mizkernel_defconfig
          ./scripts/config --enable CONFIG_KSU
          make $ARGS olddefconfig
          
          # Use -j2 to prevent Out-Of-Memory (OOM) errors on GitHub runners
          make -j2 $ARGS

      - name: 7. Build AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AK3
          cd AK3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's!block=.*!block=auto;!g' anykernel.sh
          if [ -f ../kernel/arch/arm64/boot/Image.gz ]; then
            cp ../kernel/arch/arm64/boot/Image.gz .
          else
            cp ../kernel/arch/arm64/boot/Image .
          fi
          zip -r9 ../MizKernel-A23-KSU-Next.zip *

      - name: 8. Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: MizKernel-A235F-${{ github.run_id }}
          name: MizKernel A235F Build ${{ github.run_number }}
          files: MizKernel-A23-KSU-Next.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
