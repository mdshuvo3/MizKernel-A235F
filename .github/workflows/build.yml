name: Build MizKernel A23
on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/${{ github.repository_owner }}/MizKernel-A235F
          kernel-branch: main
          
          # IMPORTANT: This tells GitHub to download the missing KernelSU code
          submodule: true
          
          config: vendor/a23_eur_open_mizkernel_defconfig
          arch: arm64
          aosp-gcc: true
          aosp-clang: true
          aosp-clang-version: r416183b
          android-version: 12
          extra-cmd: LLVM=1 LLVM_IAS=1
          ksu: false
          disable-lto: true
          anykernel3: true
