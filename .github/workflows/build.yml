name: MizKernel-A23-Path-Clearer
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf libelf-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop rsync squashfs-tools xsltproc zip zlib1g-dev python3 binutils-aarch64-linux-gnu device-tree-compiler
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: 2. Checkout & Toolchain
        run: |
          git clone --depth=1 https://github.com/${{ github.repository }} kernel
          mkdir -p toolchain/clang-r416183b
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git toolchain/clang-r416183b

      - name: 3. Nuclear KernelSU Injection
        run: |
          # 1. Clone to neutral ground
          git clone --depth=1 https://github.com/rifsxd/KernelSU-Next ksu_neutral
          
          # 2. FORCE DELETE any existing kernelsu entry (link, file, or folder)
          rm -rf kernel/drivers/kernelsu
          
          # 3. Create fresh directory and sync
          mkdir -p kernel/drivers/kernelsu
          rsync -av ksu_neutral/ kernel/drivers/kernelsu/
          
          # 4. Verify path
          if [ -f "kernel/drivers/kernelsu/Kconfig" ]; then
            echo "✅ SUCCESS: Kconfig found at kernel/drivers/kernelsu/Kconfig"
          else
            echo "❌ ERROR: File still missing!"
            exit 1
          fi

      - name: 4. Patch Kconfig
        run: |
          cd kernel
          # Remove problematic line 4 (source "drivers/kernelsu/Kconfig")
          # and append a fresh version to the end of the file.
          sed -i '4d' drivers/Kconfig
          echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig

      - name: 5. Execute Build
        run: |
          cd $GITHUB_WORKSPACE/kernel
          TC_PATH=$GITHUB_WORKSPACE/toolchain/clang-r416183b/bin
          
          BUILD_ARGS="ARCH=arm64 \
                      CC=$TC_PATH/clang \
                      LD=$TC_PATH/ld.lld \
                      AR=$TC_PATH/llvm-ar \
                      NM=$TC_PATH/llvm-nm \
                      OBJCOPY=$TC_PATH/llvm-objcopy \
                      OBJDUMP=$TC_PATH/llvm-objdump \
                      STRIP=$TC_PATH/llvm-strip \
                      CROSS_COMPILE=aarch64-linux-gnu- \
                      CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                      LLVM=1 \
                      LLVM_IAS=0"

          make $BUILD_ARGS vendor/a23_eur_open_mizkernel_defconfig
          make -j$(nproc) $BUILD_ARGS

      - name: 6. Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's!block=.*!block=auto;!g' anykernel.sh
          cp ../kernel/arch/arm64/boot/Image* . || true
          zip -r9 ../MizKernel-A23.zip * -x .git README.md

      - name: 7. Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: MizKernel-A23
          path: MizKernel-A23.zip
