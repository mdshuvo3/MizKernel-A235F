name: MizKernel-A23-DryRun
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Setup Environment
        run: sudo apt-get install -y bc bison flex libssl-dev device-tree-compiler

      - name: 2. Checkout & Setup Folders
        run: |
          # Checkout source
          git clone --depth=1 https://github.com/${{ github.repository }} kernel
          
          # 1. Create Toolchain folder exactly where the Makefile wants it
          mkdir -p kernel/toolchain/clang-r416183b
          # Create a FAKE clang file just to test the path logic
          touch kernel/toolchain/clang-r416183b/clang
          chmod +x kernel/toolchain/clang-r416183b/clang

          # 2. FORCE KernelSU folder placement (Wipe any existing first)
          rm -rf kernel/drivers/kernelsu
          mkdir -p kernel/drivers/kernelsu
          # Create a FAKE Kconfig to satisfy the check
          touch kernel/drivers/kernelsu/Kconfig

      - name: 3. Verify Filesystem (The Test)
        run: |
          echo "--- CHECKING TOOLCHAIN PATH ---"
          ls -l kernel/toolchain/clang-r416183b/clang
          
          echo "--- CHECKING KERNELSU KCONFIG ---"
          ls -l kernel/drivers/kernelsu/Kconfig
          
          echo "--- TESTING PATH RESOLUTION ---"
          cd kernel && mkdir -p out
          # Check if 'out' can see 'toolchain' using the relative path in your Makefile
          ls ../toolchain/clang-r416183b/clang
