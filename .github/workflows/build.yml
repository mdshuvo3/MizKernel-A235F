name: MizKernel A23 Final-Fixed
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf libelf-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop rsync squashfs-tools xsltproc zip zlib1g-dev python3 binutils-aarch64-linux-gnu device-tree-compiler
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: 2. Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          path: kernel

      - name: 3. Create the Hardcoded Path (The "Bulletproof" Method)
        run: |
          # The Makefile looks for ../toolchain/clang-r416183b/ relative to 'out'
          # 'out' is inside 'kernel'. So '../' from 'out' is 'kernel/'.
          # We MUST create the toolchain folder INSIDE the kernel directory.
          
          mkdir -p ${{ github.workspace }}/kernel/toolchain/clang-r416183b
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git ${{ github.workspace }}/kernel/toolchain/clang-r416183b

      - name: 4. Setup KernelSU (Satisfaction Check)
        run: |
          cd ${{ github.workspace }}/kernel/drivers
          # Your log shows drivers/Kconfig:4 can't open 'drivers/kernelsu/Kconfig'
          # This means the folder MUST be named exactly 'kernelsu'
          rm -rf kernelsu
          git clone --depth=1 https://github.com/rifsxd/KernelSU-Next kernelsu

      - name: 5. Execute Build with Path Enforcement
        run: |
          cd ${{ github.workspace }}/kernel
          mkdir -p out
          
          # We add the bin folder to the path just in case scripts call 'clang' directly
          export PATH="${{ github.workspace }}/kernel/toolchain/clang-r416183b/bin:$PATH"
          
          # Step A: Defconfig
          make O=out ARCH=arm64 vendor/a23_eur_open_mizkernel_defconfig
          
          # Step B: Compile
          # LLVM=1 and LLVM_IAS=0 are standard for Samsung 4.19
          make -j$(nproc) O=out ARCH=arm64 LLVM=1 LLVM_IAS=0

      - name: 6. AnyKernel3 Packaging
        run: |
          cd ${{ github.workspace }}
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's!block=.*!block=auto;!g' anykernel.sh
          
          # Image Hunter
          cp ../kernel/out/arch/arm64/boot/Image* . || true
          zip -r9 ../MizKernel-A23.zip * -x .git README.md

      - name: 7. Upload
        uses: actions/upload-artifact@v4
        with:
          name: MizKernel-A23-Ultimate
          path: MizKernel-A23.zip
