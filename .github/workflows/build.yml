name: mizkernel-a23-ksu-next
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. environment setup
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf libelf-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils rsync squashfs-tools xsltproc zip zlib1g-dev python3 binutils-aarch64-linux-gnu device-tree-compiler
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: 2. maximize build space & ram
        run: |
          sudo swapoff -a || true
          sudo rm -f /swap_mizkernel
          sudo dd if=/dev/zero of=/swap_mizkernel bs=1M count=16384
          sudo chmod 600 /swap_mizkernel
          sudo mkswap /swap_mizkernel
          sudo swapon /swap_mizkernel
          free -h

      - name: 3. pull source & toolchain
        run: |
          git clone --depth=1 https://github.com/mdshuvo3/MizKernel-A235F kernel
          mkdir -p toolchain
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git toolchain/clang
          # Get a GCC toolchain for complementary headers if needed
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git toolchain/gcc64
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git toolchain/gcc32
          rm -rf kernel/.git toolchain/clang/.git toolchain/gcc64/.git toolchain/gcc32/.git

      - name: 4. inject kernelsu-next
        run: |
          git clone --depth=1 https://github.com/rifsxd/KernelSU-Next ksu_src
          rm -rf kernel/drivers/kernelsu
          mkdir -p kernel/drivers/kernelsu
          cp -r ksu_src/kernel/* kernel/drivers/kernelsu/
          cd kernel && echo "obj-y += drivers/kernelsu/" >> drivers/Makefile
          cd .. && rm -rf ksu_src

      - name: 5. surgical code fixes
        run: |
          cd kernel
          # Fix Kernelsu-Next allowlist headers
          sed -i 's/static void ksu_handle_allowlist/void ksu_handle_allowlist/g' drivers/kernelsu/allowlist.h 2>/dev/null || true
          sed -i 's/void ksu_persistent_allow_list()/void ksu_persistent_allow_list(void)/g' drivers/kernelsu/allowlist.h
          
          # Inject hooks into VFS
          if ! grep -q "kernelsu/allowlist.h" fs/read_write.c; then
            sed -i '/#include <linux\/slab.h>/a #include "../drivers/kernelsu/allowlist.h"' fs/read_write.c
          fi
          
          sed -i '/ssize_t vfs_read/,/return ret;/ s/return ret;/ksu_handle_allowlist(file, buf, count, \&ret);\n\treturn ret;/' fs/read_write.c
          sed -i '/ssize_t vfs_write/,/return ret;/ s/return ret;/ksu_handle_allowlist(file, buf, count, \&ret);\n\treturn ret;/' fs/read_write.c

      - name: 6. verify & compile
        run: |
          cd kernel
          export PATH="$GITHUB_WORKSPACE/toolchain/clang/bin:$GITHUB_WORKSPACE/toolchain/gcc64/bin:$GITHUB_WORKSPACE/toolchain/gcc32/bin:$PATH"
          
          # Define standard Android build environment
          export ARCH=arm64
          export KBUILD_BUILD_USER=miz
          export KBUILD_BUILD_HOST=github-actions
          
          # Use traditional flags that 4.19 kernels expect
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          
          # Generate config
          make O=out vendor/a23_eur_open_mizkernel_defconfig CC=clang
          
          # FIX: Grant execution permission to the config script
          chmod +x scripts/config
          
          # Enable KSU
          ./scripts/config --file out/.config --enable CONFIG_KSU
          ./scripts/config --file out/.config --enable CONFIG_KSU_NEXT
          
          # Build the kernel
          make -j$(nproc) O=out \
               CC=clang \
               CLANG_TRIPLE=$CLANG_TRIPLE \
               CROSS_COMPILE=$CROSS_COMPILE \
               CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 \
               LD=ld.lld \
               AR=llvm-ar \
               NM=llvm-nm \
               OBJCOPY=llvm-objcopy \
               OBJDUMP=llvm-objdump \
               STRIP=llvm-strip

      - name: 7. build anykernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3
          cd ak3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's!block=.*!block=auto;!g' anykernel.sh
          
          # Copy the built Image from the 'out' directory
          if [ -f ../kernel/out/arch/arm64/boot/Image.gz ]; then
            cp ../kernel/out/arch/arm64/boot/Image.gz .
          elif [ -f ../kernel/out/arch/arm64/boot/Image ]; then
            cp ../kernel/out/arch/arm64/boot/Image .
          fi
          
          zip -r9 ../mizkernel-a23-ksu-next.zip *

      - name: 8. create github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mizkernel-a235f-${{ github.run_id }}
          name: mizkernel a235f build ${{ github.run_number }}
          files: mizkernel-a23-ksu-next.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
