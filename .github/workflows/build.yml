name: Build MizKernel A23
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # This pulls YOUR repo and automatically handles submodules
          repository: ${{ github.repository }}
          submodules: recursive
          fetch-depth: 0

      - name: Build Kernel
        uses: tiann/KernelSU-Action@main
        with:
          # This action is smarter and builds what is already checked out
          kernel-url: https://github.com/${{ github.repository }}
          branch: main
          config: vendor/a23_eur_open_mizkernel_defconfig
          arch: arm64
          android-version: 12
          # We tell it to use the r416183b clang version from your logs
          aosp-clang: true
          aosp-clang-version: r416183b
          # Disable its auto-patching because MizKernel has KSU built-in
          install-kernelsu: false
