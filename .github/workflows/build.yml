name: Build MizKernel A23
on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/MizKernel-A235F
          ref: main
          path: kernel-source

      - name: Fix KernelSU Shortcut
        run: |
          cd kernel-source/drivers
          # Remove the broken symbolic link file
          rm kernelsu
          # Download the actual KernelSU-Next source code into a real folder
          git clone https://github.com/rifsxd/KernelSU-Next kernelsu
          cd ..

      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: local
          kernel-dir: kernel-source
          config: vendor/a23_eur_open_mizkernel_defconfig
          arch: arm64
          aosp-gcc: true
          aosp-clang: true
          aosp-clang-version: r416183b
          android-version: 12
          extra-make-args: '["LLVM=1", "LLVM_IAS=1"]'
          ksu: false
          disable-lto: true
          anykernel3: true
